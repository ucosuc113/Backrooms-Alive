modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/glados/backrooms-mod/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="${mod_authors}"
description='''
${mod_description}

Estado actual: modulo de infraestructura. No hay generacion de mundo,
Backrooms, corrupcion ni seleccion de regiones implementadas todavia.
'''

# ---------------------------------------------------------
# Dependencias obligatorias
# ---------------------------------------------------------

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Immersive Portals es obligatorio: todo el sistema de portales del mod
# dependera de el. No se usaran teletransportes clasicos.
# NOTA: verificar que "immersive_portals" coincide con el modId real
# del jar descargado (puede comprobarse extrayendo su propio mods.toml).
[[dependencies.${mod_id}]]
    modId="immersive_portals"
    mandatory=true
    versionRange="[3.0.0,)"
    ordering="AFTER"
    side="BOTH"

# Cloth Config es dependencia obligatoria de Immersive Portals en 1.19+.
[[dependencies.${mod_id}]]
    modId="cloth_config"
    mandatory=true
    versionRange="[11.0.0,)"
    ordering="AFTER"
    side="BOTH"
